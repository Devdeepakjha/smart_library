<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Smart Library</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="nav-left">
        <div class="brand">Smart Library</div>
      </div>
      <div class="nav-right small">Login</div>
    </div>

    <div class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% set cat = messages[0][0] %}
        {% set msg = messages[0][1] %}
        <div class="alert {{ cat }}"><strong>{{ msg }}</strong></div>
      {% endif %}
      {% endwith %}

      <div class="card" style="max-width: 520px; margin: 0 auto;">
        <h2 class="title">Login</h2>
        <form method="post" action="/login">
          <div class="form-group">
            <label class="small">Username</label>
            <input name="username" placeholder="Enter username" required />
          </div>
          <div class="form-group">
            <label class="small">Password</label>
            <input type="password" name="password" placeholder="Enter password" required />
          </div>
          <button class="btn primary" type="submit">Login</button>
          <a class="btn light" href="/signup" style="margin-left: 8px;">Create Account</a>
        </form>
        <p class="muted" style="margin-top: 12px;">
          Admin default: <strong>admin / admin123</strong>
        </p>
      </div>

      <div class="footer">
        Smart Library System | Student Project
      </div>
    </div>
  </body>
</html>
